<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Tokky — Token Counter{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='img/logo.svg') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'bg-primary': '#1a1b1e',
                        'bg-surface': '#212226',
                        'bg-elevated': '#2a2b30',
                        'bg-hover': '#313238',
                        'border-subtle': '#2e2f35',
                        'border-default': '#3a3b42',
                        'text-primary': '#ececec',
                        'text-secondary': '#8b8c94',
                        'text-muted': '#5a5b63',
                        'accent': '#e07b39',
                        'accent-soft': 'rgba(224, 123, 57, 0.12)',
                        'accent-glow': 'rgba(224, 123, 57, 0.25)',
                        'token-low': '#2d5a3d',
                        'token-mid': '#7a5c1e',
                        'token-high': '#7a2d2d',
                        'success': '#4ade80',
                        'warning': '#fbbf24',
                        'danger': '#f87171',
                    },
                    fontFamily: {
                        sans: ['DM Sans', 'sans-serif'],
                        display: ['DM Sans', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer base {
            body {
                @apply bg-bg-primary text-text-primary font-sans antialiased;
            }
        }
        @layer utilities {
            .custom-scrollbar::-webkit-scrollbar { width: 6px; }
            .custom-scrollbar::-webkit-scrollbar-track { @apply bg-transparent; }
            .custom-scrollbar::-webkit-scrollbar-thumb { @apply bg-border-default rounded-full; }
            .custom-scrollbar::-webkit-scrollbar-thumb:hover { @apply bg-text-muted; }
            
            .sidebar-link {
                @apply flex items-center gap-3 px-3 py-2 rounded-md transition-all duration-200 text-sm font-medium;
            }
            .sidebar-link.active {
                @apply bg-bg-elevated text-white;
            }
            .sidebar-link:not(.active) {
                @apply text-text-secondary hover:bg-bg-hover hover:text-text-primary;
            }
            
            .input-field {
                @apply w-full bg-bg-elevated border border-border-subtle rounded-md px-3 py-2 text-sm text-text-primary focus:outline-none focus:border-accent transition-colors appearance-none;
            }
            
            .panel-card {
                @apply bg-bg-surface border border-border-subtle rounded-xl overflow-hidden flex flex-col;
            }
        }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden flex p-0">
    
    <!-- Sidebar -->
    <aside class="w-[220px] bg-bg-surface border-r border-border-subtle flex flex-col h-full shrink-0">
        <!-- Branding -->
        <div class="p-6 flex items-center justify-between">
            <div class="flex items-center gap-2.5">
                <img src="{{ url_for('static', filename='img/logo.svg') }}" class="w-7 h-7 drop-shadow-sm" alt="Tokky Logo">
                <h1 class="text-sm font-bold tracking-tight text-text-primary uppercase">Tokky</h1>
            </div>
        </div>

        <!-- Navigation -->
        <div class="px-3 flex flex-col gap-1">
            <h3 class="px-3 text-[10px] font-bold text-text-muted uppercase tracking-widest mb-2">Modes</h3>
            <nav class="flex flex-col gap-0.5">
                <a href="{{ url_for('input_mode') }}" class="sidebar-link {% if active_mode == 'input' %}active{% endif %}">
                    <i data-lucide="file-up" class="w-4 h-4"></i>
                    <span>Input Mode</span>
                </a>
                <a href="{{ url_for('chat_mode') }}" class="sidebar-link {% if active_mode == 'chat' %}active{% endif %}">
                    <i data-lucide="message-square" class="w-4 h-4"></i>
                    <span>Chat Mode</span>
                </a>
            </nav>
        </div>

        <!-- Saved Sessions -->
        <div class="px-3 mt-8 flex flex-col gap-1">
            <div class="px-3 flex items-center justify-between mb-2">
                <h3 class="text-[10px] font-bold text-text-muted uppercase tracking-widest">Saved Sessions</h3>
                <button class="text-text-muted hover:text-accent transition-colors" onclick="if(window.location.pathname === '/chat') { clearChatBtn.click(); } else { window.location.href = '/chat'; }">
                    <i data-lucide="plus" class="w-3 h-3"></i>
                </button>
            </div>
            <div class="text-[11px] text-text-muted px-3 italic">No saved sessions yet.</div>
        </div>

        <!-- Settings -->
        <div class="mt-auto p-4 border-t border-border-subtle flex flex-col gap-4 bg-bg-surface/50">
            <div class="flex flex-col gap-1.5">
                <label for="provider" class="text-[10px] font-bold text-text-muted uppercase tracking-widest">Method</label>
                <div class="relative flex items-center">
                    <select id="provider" name="provider" class="input-field">
                        {% for p in providers %}
                        <option value="{{ p }}">{{ p }}</option>
                        {% endfor %}
                    </select>
                    <i data-lucide="chevron-down" class="absolute right-3 w-3.5 h-3.5 pointer-events-none text-text-muted"></i>
                </div>
            </div>

            <div class="flex flex-col gap-1.5">
                <label for="model" class="text-[10px] font-bold text-text-muted uppercase tracking-widest">Tokenizer</label>
                <div class="relative flex items-center">
                    <select id="model" name="model" class="input-field"></select>
                    <i data-lucide="chevron-down" class="absolute right-3 w-3.5 h-3.5 pointer-events-none text-text-muted"></i>
                </div>
            </div>

            <div id="context-info" class="text-[11px] font-medium leading-relaxed"></div>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 h-full min-w-0 flex flex-col bg-bg-primary">
        {% block content %}{% endblock %}
    </main>

    <!-- Results Modal -->
    <div class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-6 z-[1000] opacity-0 pointer-events-none transition-all duration-200" id="results-modal">
        <div class="bg-bg-surface border border-border-default w-full max-w-5xl max-h-[90vh] flex flex-col overflow-hidden rounded-xl shadow-2xl">
            <div class="px-6 py-4 border-b border-border-subtle flex justify-between items-center bg-bg-surface">
                <h2 class="text-base font-bold text-text-primary flex items-center gap-2">
                    <i data-lucide="bar-chart-3" class="w-5 h-5 text-accent"></i>
                    <span>Token Analysis</span>
                </h2>
                <button type="button" class="text-text-muted hover:text-text-primary transition-colors" id="close-modal-btn">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="p-6 overflow-y-auto flex-1 custom-scrollbar" id="modal-content">
                <!-- Analysis results will be injected here -->
            </div>
            <div class="px-6 py-4 border-t border-border-subtle flex justify-end gap-3 bg-bg-elevated/30">
                <button type="button" class="px-6 py-2 bg-accent hover:bg-opacity-90 text-white rounded-md text-sm font-bold transition-all" id="modal-done-btn">Done</button>
            </div>
        </div>
    </div>

    <script>
        const MODELS = {{ models | tojson }};
        const MODEL_LIMITS = {{ model_limits | default({}) | tojson }};
        // Initialize icons
        lucide.createIcons();
    </script>
    <script src="{{ url_for('static', filename='js/common.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
